---
# playbooks/common-setup.yml
# vim: set tabstop=2 shiftwidth=2 expandtab:

# ansible-lint skip-file
# yaml-language-server: $schema=https://raw.githubusercontent.com/ansible/ansible-lint/main/src/ansiblelint/schemas/tasks.json

# Common setup tasks shared across multiple playbooks.
# This is a tasks file, not a playbook - included via include_tasks.

- name: Determine target group
  ansible.builtin.set_fact:
    target_group: "{{ group_names | difference([inventory_hostname]) | sort | first }}"
  when: target_group is not defined

- name: Validate target group is defined
  ansible.builtin.assert:
    that: target_group is defined
    fail_msg: "target_group is not defined. Ensure the host belongs to at least one group."

- name: Load global group variables
  ansible.builtin.include_vars:
    file: "../group_vars/all/main.yml"

- name: Load group-specific variables
  ansible.builtin.include_vars:
    file: "../group_vars/{{ target_group }}/main.yml"

- name: Ensure build directory exists
  ansible.builtin.file:
    path: "{{ build_dir }}"
    state: directory
    mode: "0755"
