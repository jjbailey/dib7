---
# playbooks/import-ova-vsphere.yml
# vim: set tabstop=2 shiftwidth=2 expandtab:

# Playbook to import an OVA file to a vSphere content library.
# VMDK must be streamOptimized.

- name: Import OVA to vSphere
  hosts: "{{ target_hosts | default('all') }}"
  gather_facts: false
  serial: 1

  pre_tasks:
    - name: Verify pwsh is available on localhost
      ansible.builtin.command:
        cmd: pwsh --version
      delegate_to: localhost
      register: pwsh_check
      failed_when: pwsh_check.rc != 0
      changed_when: false

    - name: Verify vSphere import helper exists on localhost
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../bin/import-ova-vsphere.ps1"
      delegate_to: localhost
      register: import_helper_stat

    - name: Fail if vSphere import helper is missing
      ansible.builtin.fail:
        msg: "vSphere import helper {{ playbook_dir }}/../bin/import-ova-vsphere.ps1 is missing"
      when: not import_helper_stat.stat.exists or not import_helper_stat.stat.isreg

  tasks:
    - name: Include common setup tasks
      ansible.builtin.include_tasks: common-setup.yml

    - name: Include vSphere vault variables
      ansible.builtin.include_vars:
        file: "../vaults/vsphere.yml"

    - name: Verify source OVA file exists
      ansible.builtin.stat:
        path: "{{ build_dir }}/{{ ova_file }}"
      delegate_to: localhost
      register: ova_stat

    - name: Fail if source OVA file is missing or empty on localhost
      ansible.builtin.fail:
        msg: "Source OVA file {{ build_dir }}/{{ ova_file }} is missing or empty on localhost"
      when: not ova_stat.stat.exists or not ova_stat.stat.isreg or (ova_stat.stat.size | default(0) | int) == 0

    - name: Import OVA to vSphere content library
      block:
        - name: Initiate import process
          ansible.builtin.command:
            argv:
              - pwsh
              - "{{ playbook_dir }}/../bin/import-ova-vsphere.ps1"
              - "-library"
              - "{{ vsphere_content_library }}"
              - "-ova"
              - "{{ build_dir }}/{{ ova_file }}"
          delegate_to: localhost
          register: import_result
          changed_when: import_result.rc == 0
          no_log: true
          environment:
            vcenter_hostname: "{{ vcenter_hostname }}"
            vcenter_username: "{{ vcenter_username }}"
            vcenter_password: "{{ vcenter_password }}"

      rescue:
        - name: Fail with vSphere import error details
          ansible.builtin.fail:
            msg: >-
              vSphere OVA import failed with rc={{ import_result.rc | default('unknown') }}.
              stderr={{ import_result.stderr | default('') | trim }}
              stdout={{ import_result.stdout | default('') | trim }}

      always:
        - name: Display import result
          ansible.builtin.debug:
            msg: "OVA import exited with return code {{ import_result.rc }}"
          when: import_result is defined

