---
# playbooks/import-qcow2-openstack.yml
# vim: set tabstop=2 shiftwidth=2 expandtab:

# Import QCOW2 file to OpenStack.

- name: Import QCOW2 to OpenStack Image
  hosts: "{{ target_hosts | default('all') }}"
  gather_facts: false
  serial: 1

  tasks:
    - name: Import and process image
      block:
        - name: Include common setup tasks
          ansible.builtin.include_tasks: common-setup.yml

        - name: Include OpenStack vault variables
          ansible.builtin.include_vars:
            file: "../vaults/openstack.yml"

        - name: Verify source file exists
          ansible.builtin.stat:
            path: "{{ build_dir }}/{{ qcow2_file }}"
          register: qcow2_stat

        - name: Fail if source QCOW2 file is missing or empty
          ansible.builtin.fail:
            msg: "Source QCOW2 file {{ build_dir }}/{{ qcow2_file }} is missing or empty"
          when: not qcow2_stat.stat.exists or not qcow2_stat.stat.isreg or (qcow2_stat.stat.size | default(0) | int) == 0

        - name: Check if image already exists in OpenStack
          openstack.cloud.image_info:
            auth: "{{ openstack_auth }}"
            name: "{{ image_name }}"
          register: existing_image
          no_log: true

        - name: Delete existing image if it exists
          openstack.cloud.image:
            auth: "{{ openstack_auth }}"
            name: "{{ image_name }}"
            state: absent
          when: existing_image.images | length > 0
          no_log: true

        - name: Wait for existing image deletion to complete
          openstack.cloud.image_info:
            auth: "{{ openstack_auth }}"
            name: "{{ image_name }}"
          register: deleted_image_status
          until: deleted_image_status.images | length == 0
          retries: "{{ openstack_delete_poll_retries | default(40) | int }}"
          delay: "{{ openstack_delete_poll_delay | default(3) | int }}"
          when: existing_image.images | length > 0
          no_log: true

        - name: Upload QCOW2 to OpenStack
          openstack.cloud.image:
            auth: "{{ openstack_auth }}"
            name: "{{ image_name }}"
            filename: "{{ build_dir }}/{{ qcow2_file }}"
            disk_format: qcow2
            container_format: bare
            state: present
          register: image_upload
          no_log: true

        - name: Display upload status
          ansible.builtin.debug:
            msg: "Image upload initiated: {{ image_upload.image.id }}"

        - name: Wait for image to be active
          openstack.cloud.image_info:
            auth: "{{ openstack_auth }}"
            name: "{{ image_name }}"
          register: image_status
          until: >
            image_status.images | length > 0 and
            (image_status.images | first).status | lower in ['active', 'killed', 'deleted', 'deactivated']
          retries: "{{ openstack_import_poll_retries | default(120) | int }}"
          delay: "{{ openstack_import_poll_delay | default(15) | int }}"
          failed_when: >
            image_status.images | length > 0 and
            (image_status.images | first).status | lower in ['killed', 'deleted', 'deactivated']
          no_log: true

        - name: Fail if image was not found after upload polling
          ansible.builtin.fail:
            msg: "OpenStack image {{ image_name }} was not found after upload polling completed"
          when: image_status.images | length == 0

        - name: Fail if image did not become active
          ansible.builtin.fail:
            msg: "OpenStack image {{ image_name }} ended in unexpected status {{ (image_status.images | first).status }}"
          when: ((image_status.images | first).status | lower) != 'active'

        - name: Record new image ID
          ansible.builtin.set_fact:
            new_image_id: "{{ (image_status.images | first).id }}"

        - name: Display new image ID
          ansible.builtin.debug:
            msg: "Import complete! Image ID: {{ new_image_id }}"

      rescue:
        - name: Fail with error message
          ansible.builtin.fail:
            msg: "Import process failed: {{ ansible_failed_result.msg | default('unknown error') }}"

